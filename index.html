<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Parcel Scanner Pro – Multi-Device</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        .header-bar h1 { margin: 0; color: #333; font-size: 24px; }

        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .cloud-status { font-size: 14px; padding: 5px 12px; background: #d4edda; color: #155724; border-radius: 20px; font-weight: bold; border: 1px solid #c3e6cb; transition: background 0.3s; }
        .cloud-status.syncing { background: #cce5ff; color: #004085; border-color: #b8daff; }
        .cloud-status.error   { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }

        .sync-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; display: inline-block; }
        .sync-dot.live { background: #28a745; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .last-sync-text { font-size: 12px; color: #888; }

        .flow-controls { display: flex; gap: 10px; align-items: center; background: #eef; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-top: 10px; flex-wrap: wrap; }
        select { padding: 8px; font-size: 16px; border-radius: 4px; font-weight: bold; }

        .section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #ddd; }
        textarea, input[type="text"], input[type="date"] { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 15px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .btn-primary   { background: #0056b3; }
        .btn-primary:hover { background: #004494; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-danger-sm { background: #dc3545; }
        .btn-danger-sm:hover { background: #c82333; }

        #download-btn { background: #28a745; margin-right: 10px; }
        #download-btn:disabled { background: #ccc; cursor: not-allowed; }
        #finish-btn { background: #17a2b8; }
        #backup-btn { background: #ff9800; margin-right: 10px; }
        #view-backup-btn { background: #6f42c1; }

        .filter-box { background: #e2e3e5; padding: 10px; border-radius: 4px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: #383d41; flex-wrap: wrap; gap: 8px; }
        .filter-left { display: flex; align-items: center; gap: 10px; }
        .filter-box input[type="date"] { width: auto; margin-top: 0; padding: 5px; }
        .filter-box input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }

        .scanner-wrapper { position: relative; }
        #active-flow-label { position: absolute; top: 50%; right: 160px; transform: translateY(-50%); background: #0056b3; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; white-space: nowrap; }
        #scanner-input { font-size: 24px; background-color: #eef; transition: background-color 0.3s; padding-right: 310px; width: 100%; box-sizing: border-box; margin-top: 0; }
        #scanner-input:disabled { background-color: #ccc; cursor: not-allowed; }

        #log { margin-top: 10px; padding: 10px; font-weight: bold; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; text-align: center; }
        .modal-content { background: white; margin: 10% auto; padding: 40px; width: 90%; max-width: 650px; border-radius: 8px; }
        .red-modal { border: 8px solid #dc3545; }
        .yellow-modal { border: 8px solid #ffc107; }
        .blue-modal { border: 8px solid #17a2b8; max-width: 750px; text-align: left; }
        
        #camera-modal { z-index: 900; }
        #reader { width: 100%; min-height: 300px; background: #000; border-radius: 8px; overflow: hidden; }
        .button-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        #flash-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(40, 167, 69, 0.7); z-index: 9999; pointer-events: none; transition: opacity 0.2s; }
        .missing-checkbox { width: 20px; height: 20px; cursor: pointer; }
        .multidev-banner { background: #e8f4fd; border: 1px solid #bee3f8; border-radius: 6px; padding: 10px 14px; font-size: 13px; color: #2c5282; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div id="flash-overlay"></div>

<div id="backup-modal" class="modal-overlay">
    <div class="modal-content" style="max-width:600px;text-align:left;">
        <h2>💾 Saved Backups</h2>
        <div id="backup-list" style="max-height:300px;overflow-y:auto;border:1px solid #ccc;padding:10px;margin-bottom:15px;"></div>
        <button class="btn-secondary" style="width:100%" onclick="document.getElementById('backup-modal').style.display='none'">Close</button>
    </div>
</div>

<div id="duplicate-modal" class="modal-overlay">
    <div class="modal-content red-modal"><h2>⚠️ DUPLICATE!</h2><button class="btn-danger-sm" onclick="resumeScanning('duplicate-modal')">OK</button></div>
</div>

<div id="invalid-modal" class="modal-overlay">
    <div class="modal-content yellow-modal"><h2>⚠️ INVALID!</h2><button class="btn-secondary" onclick="resumeScanning('invalid-modal')">OK</button></div>
</div>

<div id="missing-modal" class="modal-overlay">
    <div class="modal-content blue-modal">
        <h2 style="text-align:center;">📋 Missing Parcels</h2>
        <div style="display:flex;justify-content:center;gap:10px;margin-bottom:15px;">
            <button id="copy-print-btn" class="btn-primary" onclick="copyBulkLinks('print')">📋 Copy All Print Links</button>
            <button id="copy-order-btn" class="btn-primary" onclick="copyBulkLinks('order')">📋 Copy All Order Links</button>
        </div>
        <div style="max-height:350px;overflow-y:auto;background:#f8f9fa;">
            <table id="missing-table">
                <thead style="position:sticky;top:0;background:#e9ecef;z-index:1;">
                    <tr>
                        <th style="width:30px;text-align:center;">✓</th>
                        <th>Tracking ID</th>
                        <th>Order ID</th>
                    </tr>
                </thead>
                <tbody id="missing-list-container"></tbody>
            </table>
        </div>
        <div class="button-group">
            <button class="btn-primary" onclick="downloadMissingExcel()">⬇️ Download List</button>
            <button class="btn-secondary" onclick="resumeScanning('missing-modal')">Close</button>
        </div>
    </div>
</div>

<div id="camera-modal" class="modal-overlay">
    <div class="modal-content"><button class="btn-danger-sm" onclick="stopCamera()">✖ Close</button><div id="reader"></div></div>
</div>

<div class="container">
    <div class="header-bar"><h1>☁️ Cloud Scanner Pro</h1><div class="header-right"><div id="cloud-status">Connecting…</div></div></div>
    <div class="multidev-banner">🔗 <strong>Multi-Device Sync Active.</strong></div>
    
    <div class="flow-controls">
        <select id="flow-selector" onchange="switchFlow()"></select>
        <button class="btn-primary" onclick="createNewFlow()">➕ New Company</button>
        <button class="btn-danger-sm" onclick="deleteCurrentFlow()">🗑️</button>
    </div>

    <div class="section">
        <h3>1. Input Expected</h3>
        <div class="filter-box">
            <div class="filter-left">
                <input type="checkbox" id="use-date-filter" checked> Only load parcels on: <input type="date" id="target-ship-date">
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <input type="file" id="file-upload" accept=".txt,.csv" style="display:none;" onchange="handleFileUpload(event)">
                <button class="btn-primary" style="margin-top:0;" onclick="document.getElementById('file-upload').click()">📁 Upload .txt / .csv</button>
                <input type="file" id="reverse-file-upload" accept=".txt,.csv" style="display:none;" onchange="handleReverseFileUpload(event)">
                <button style="background:#dc3545;margin-top:0;" onclick="document.getElementById('reverse-file-upload').click()">📁 Reverse File</button>
            </div>
        </div>
        <textarea id="expected-ids" rows="5"></textarea>
        <div class="button-group">
            <button class="btn-primary" onclick="addExpectedIDsFromPaste()">➕ Add Pasted Data</button>
            <button class="btn-secondary" onclick="resetCurrentFlow()">🗑️ Clear Current Flow</button>
        </div>
    </div>

    <div class="section">
        <h3>2. Scan Parcels</h3>
        <div class="scanner-wrapper">
            <input type="text" id="scanner-input" placeholder="Scan barcode..." autofocus>
            <div id="active-flow-label">Target: —</div>
            <button class="btn-primary" onclick="startCamera()" style="padding:10px 20px;font-size:18px;background:#28a745;margin-top:0;white-space:nowrap;">📷 Camera</button>
        </div>
        <div id="log" style="display:none;"></div>
    </div>

    <div class="section" style="border-bottom:none;">
        <h3>3. Summary (<span id="scanned-count">0</span> / <span id="total-expected">0</span>)</h3>
        <div class="button-group" style="margin-bottom:10px;">
            <button id="backup-btn" onclick="createBackup()">💾 Save Backup Snapshot</button>
            <button id="view-backup-btn" onclick="showBackups()">📂 View Backups</button>
        </div>
        <div class="button-group">
            <button id="download-btn" onclick="downloadExcel()" disabled>⬇️ Download List</button>
            <button id="finish-btn" onclick="checkRemaining()">🏁 Finish</button>
        </div>
        <table id="history-table"><thead><tr><th>#</th><th>Order ID</th><th>Tracking ID</th><th>Time</th><th>Device</th></tr></thead><tbody id="history-body"></tbody></table>
    </div>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyA-xmL30L6UtY3Y5kSCizjUDggM2BxRnmY",
    authDomain: "parcel-scanning-af4d7.firebaseapp.com",
    databaseURL: "https://parcel-scanning-af4d7-default-rtdb.firebaseio.com",
    projectId: "parcel-scanning-af4d7",
    storageBucket: "parcel-scanning-af4d7.firebasestorage.app",
    messagingSenderId: "433825457659",
    appId: "1:433825457659:web:add481ad74320372f3175e"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let allFlowKeys = {};
let activeFlowKey = "";
let activeFlowName= "";
let expectedMap = new Map();
let scannedList = new Set();
let scanHistory = [];
let currentMissingIds = [];
let activeScansUnsubscribe = null;
let activeExpectedUnsubscribe = null;
let html5QrCode;
let isCameraPaused = false;

const DEVICE_ID = (() => {
    let id = sessionStorage.getItem('scannerDeviceId');
    if (!id) { id = "Dev-" + Math.random().toString(36).substring(2, 6).toUpperCase(); sessionStorage.setItem('scannerDeviceId', id); }
    return id;
})();

function sanitizeKey(name) { return name.replace(/[.#$[\]/\s]/g, '_'); }
function setCloudStatus(text, state = 'ok') {
    const el = document.getElementById('cloud-status'); el.innerText = text;
    el.className = 'cloud-status' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
}
function markSynced() {
    document.getElementById('sync-dot').className = 'sync-dot live';
    document.getElementById('last-sync-text').innerText = 'Last sync: ' + new Date().toLocaleTimeString();
    setCloudStatus('✅ Live – ' + DEVICE_ID);
}
function flashScreenGreen() {
    const f = document.getElementById('flash-overlay'); f.style.opacity = '1'; f.style.display = 'block';
    setTimeout(() => { f.style.opacity = '0'; }, 100); setTimeout(() => { f.style.display  = 'none'; }, 300);
}
function showLog(msg, type) {
    const box = document.getElementById('log'); box.style.display = 'block'; box.innerText = msg; box.className = type;
    setTimeout(() => { box.style.display = 'none'; }, 4000);
}
function playSound(type) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        if (type === 'success') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(2.0, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.2);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(type === 'duplicate' ? 200 : 400, ctx.currentTime);
            gain.gain.setValueAtTime(0.5, ctx.currentTime); osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.4);
        }
    } catch(e) {}
}

document.getElementById('target-ship-date').value = new Date().toISOString().split('T')[0];

function listenToFlowList() {
    onValue(ref(db, 'scannerV2/flowList'), (snapshot) => {
        allFlowKeys = {};
        if (snapshot.exists()) Object.entries(snapshot.val()).forEach(([k, v]) => { allFlowKeys[k] = v; });
        if (Object.keys(allFlowKeys).length === 0) {
            allFlowKeys['Default_Company'] = 'Default Company';
            set(ref(db, `scannerV2/flowList/Default_Company`), 'Default Company');
        }
        refreshFlowDropdown();
        if (!activeFlowKey) {
            const firstKey = Object.keys(allFlowKeys)[0];
            loadFlowIntoMemory(firstKey, allFlowKeys[firstKey]);
        }
    }, () => { setCloudStatus('❌ DB Locked', 'error'); });
}

function attachExpectedListener(flowKey) {
    if (activeExpectedUnsubscribe) { activeExpectedUnsubscribe(); activeExpectedUnsubscribe = null; }
    activeExpectedUnsubscribe = onValue(ref(db, `scannerV2/flows/${flowKey}/expected`), (snapshot) => {
        expectedMap = new Map();
        if (snapshot.exists()) Object.entries(snapshot.val()).forEach(([tid, oid]) => { expectedMap.set(tid, oid || ''); });
        document.getElementById('total-expected').innerText = expectedMap.size;
        markSynced();
    });
}

function attachScansListener(flowKey) {
    if (activeScansUnsubscribe) { activeScansUnsubscribe(); activeScansUnsubscribe = null; }
    activeScansUnsubscribe = onValue(ref(db, `scannerV2/flows/${flowKey}/scans`), (snapshot) => {
        scannedList = new Set(); scanHistory = [];
        if (snapshot.exists()) {
            Object.entries(snapshot.val()).forEach(([, scan]) => {
                scannedList.add(scan.id);
                scanHistory.push({ id: scan.id, time: scan.time, orderId: scan.orderId || '', device: scan.device || '?' });
            });
            scanHistory.forEach((item, i) => { item.number = i + 1; });
        }
        updateSummaryUI(); markSynced();
    });
}

function refreshFlowDropdown() {
    const sel = document.getElementById('flow-selector'); const prev = sel.value; sel.innerHTML = '';
    Object.entries(allFlowKeys).forEach(([key, name]) => {
        const opt = document.createElement('option'); opt.value = key; opt.text = name;
        if (key === activeFlowKey) opt.selected = true; sel.appendChild(opt);
    });
    if (prev && allFlowKeys[prev]) sel.value = prev;
}

function loadFlowIntoMemory(flowKey, flowName) {
    activeFlowKey = flowKey; activeFlowName = flowName || allFlowKeys[flowKey] || flowKey;
    expectedMap = new Map(); scannedList = new Set(); scanHistory = [];
    document.getElementById('adding-target-text').innerText = activeFlowName;
    document.getElementById('active-flow-label').innerText  = 'Target: ' + activeFlowName.toUpperCase();
    document.getElementById('total-expected').innerText = '…';
    updateSummaryUI(); attachExpectedListener(flowKey); attachScansListener(flowKey);
    document.getElementById('scanner-input').focus();
}

window.switchFlow = function() {
    const newKey = document.getElementById('flow-selector').value;
    if (newKey !== activeFlowKey) loadFlowIntoMemory(newKey, allFlowKeys[newKey]);
};

window.createNewFlow = function() {
    const name = prompt('Enter a name for the new company:');
    if (!name || !name.trim()) return;
    const clean = name.trim(); const key = sanitizeKey(clean);
    if (allFlowKeys[key]) { alert('Company exists!'); return; }
    set(ref(db, `scannerV2/flowList/${key}`), clean).then(() => {
        document.getElementById('flow-selector').value = key; loadFlowIntoMemory(key, clean);
    });
};

window.deleteCurrentFlow = function() {
    if (Object.keys(allFlowKeys).length <= 1) { alert('Cannot delete last company.'); return; }
    if (!confirm(`⚠️ Delete company "${activeFlowName}"?`)) return;
    remove(ref(db, `scannerV2/flowList/${activeFlowKey}`)); remove(ref(db, `scannerV2/flows/${activeFlowKey}`));
};

function processScannedId(scannedId) {
    if (!scannedId) return;
    if (scannedList.has(scannedId)) return triggerDuplicateLockout(scannedId);
    if (!expectedMap.has(scannedId)) return triggerInvalidLockout(scannedId);
    
    scannedList.add(scannedId);
    const now = new Date();
    push(ref(db, `scannerV2/flows/${activeFlowKey}/scans`), {
        id: scannedId, time: now.toLocaleTimeString() + ' on ' + now.toLocaleDateString(),
        orderId: expectedMap.get(scannedId) || '', device: DEVICE_ID
    }).then(() => {
        playSound('success'); flashScreenGreen(); showLog(`✅ SUCCESS: ${scannedId}`, 'success');
    }).catch(() => { scannedList.delete(scannedId); showLog('❌ Network error', 'warning'); });
}

document.getElementById('scanner-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { processScannedId(this.value.trim()); this.value = ''; }
});

function triggerDuplicateLockout(id) {
    isCameraPaused = true; playSound('duplicate');
    document.getElementById('scanner-input').disabled = true;
    document.getElementById('duplicate-id-text').innerText = id;
    document.getElementById('duplicate-modal').style.display = 'block';
}
function triggerInvalidLockout(id) {
    isCameraPaused = true; playSound('invalid');
    document.getElementById('scanner-input').disabled = true;
    document.getElementById('invalid-id-text').innerText = id;
    document.getElementById('invalid-modal').style.display = 'block';
}
window.resumeScanning = function(modalId) {
    document.getElementById(modalId).style.display = 'none';
    const inp = document.getElementById('scanner-input');
    inp.disabled = false; inp.value = ''; inp.focus(); isCameraPaused = false;
};

window.startCamera = function() {
    document.getElementById('camera-modal').style.display = 'block';
    html5QrCode = new Html5Qrcode('reader');
    html5QrCode.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 250, height: 150 } }, (decoded) => {
        if (isCameraPaused) return;
        processScannedId(decoded); isCameraPaused = true;
        setTimeout(() => {
            if (document.getElementById('duplicate-modal').style.display !== 'block' && document.getElementById('invalid-modal').style.display !== 'block') isCameraPaused = false;
        }, 1500);
    }).catch(err => { alert('Camera error: ' + err); window.stopCamera(); });
};
window.stopCamera = function() {
    if (html5QrCode) html5QrCode.stop().then(() => { html5QrCode.clear(); document.getElementById('camera-modal').style.display = 'none'; }).catch(() => {});
    else document.getElementById('camera-modal').style.display = 'none';
};

function saveExpectedData() {
    if (!activeFlowKey) return;
    const obj = {}; expectedMap.forEach((oid, tid) => { obj[tid] = oid || ''; });
    set(ref(db, `scannerV2/flows/${activeFlowKey}/expected`), Object.keys(obj).length ? obj : null);
}

// ------------------------------------------------------------------
// SMART PARSER LOGIC - UPDATED FOR SELLER FLEX
// ------------------------------------------------------------------
function processRawText(text, sourceName) {
    const lines = text.split('\n');
    const useDateFilter = document.getElementById('use-date-filter').checked;
    const targetDate    = document.getElementById('target-ship-date').value;
    let added = 0, skipped = 0;

    const isSellerFlex = activeFlowName.toLowerCase().includes('seller flex');

    if (isSellerFlex && lines.length > 0) {
        let headerIdx = 0;
        while (headerIdx < lines.length && !lines[headerIdx].trim()) headerIdx++;
        if (headerIdx >= lines.length) return;

        const headerLine = lines[headerIdx];
        const delimiter = headerLine.includes('\t') ? '\t' : ',';
        
        const parseLine = (line, delim) => {
            if (delim === '\t') return line.split('\t').map(c => c.trim().replace(/^"|"$/g, ''));
            let res = [], inQ = false, curr = '';
            for (let i=0; i<line.length; i++) {
                let c = line[i];
                if (c === '"') inQ = !inQ;
                else if (c === delim && !inQ) { res.push(curr.trim()); curr = ''; }
                else curr += c;
            }
            res.push(curr.trim());
            return res.map(val => val.replace(/^"|"$/g, ''));
        };

        const headers = parseLine(headerLine, delimiter).map(h => h.toLowerCase());
        let orderIdIdx = headers.findIndex(h => h.includes('amazon-order-id') || h.includes('order-id') || h.includes('order id'));
        let trackingIdIdx = headers.findIndex(h => h.includes('tracking-id') || h.includes('tracking id'));

        if (orderIdIdx !== -1 && trackingIdIdx !== -1) {
            for (let i = headerIdx + 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = parseLine(lines[i], delimiter);
                const oid = cols[orderIdIdx];
                const tid = cols[trackingIdIdx];

                if (!tid || /^(tracking.?id)$/i.test(tid)) continue;
                
                if (!expectedMap.has(tid)) { expectedMap.set(tid, oid); added++; }
            }
        } else {
            alert("Could not detect 'Order ID' and 'Tracking ID' columns in this Seller Flex file. Please check the file headers.");
            return;
        }

    } else {
        lines.forEach(line => {
            if (!line.trim()) return;
            const cols = line.split(/[,\t]/);
            let tid = '', oid = '', dateStr = '';

            if (cols.length >= 3) {
                oid     = cols[0].trim().replace(/^"|"$/g, '');
                tid     = cols[1].trim().replace(/^"|"$/g, '');
                dateStr = cols[2].trim().replace(/^"|"$/g, '');
            } else if (cols.length === 2) {
                oid = cols[0].trim().replace(/^"|"$/g, '');
                tid = cols[1].trim().replace(/^"|"$/g, '');
            } else {
                tid = line.trim().replace(/^"|"$/g, '');
            }

            if (!tid || /^(tracking.?id)$/i.test(tid)) return;

            if (useDateFilter && dateStr) {
                if (dateStr.substring(0, 10) !== targetDate) { skipped++; return; }
            }
            if (!expectedMap.has(tid)) { expectedMap.set(tid, oid); added++; }
        });
    }

    document.getElementById('total-expected').innerText = expectedMap.size;
    showLog(`Added ${added} IDs from ${sourceName}.` + (skipped ? ` (Skipped ${skipped} date-filtered)` : ''), 'success');
    document.getElementById('scanner-input').focus();
    saveExpectedData();
}
// ------------------------------------------------------------------

function processReverseRawText(text, sourceName) {
    const lines = text.split('\n'); let removed = 0;
    lines.forEach(line => {
        if (!line.trim()) return;
        const cols = line.split(/[,\t]/);
        let tid = cols.length >= 2 ? cols[1].trim() : line.trim();
        tid = tid.replace(/^"|"$/g, '');
        if (!tid || /^(tracking.?id)$/i.test(tid)) return;
        if (expectedMap.has(tid)) { expectedMap.delete(tid); removed++; }
    });
    document.getElementById('total-expected').innerText = expectedMap.size;
    showLog(`Removed ${removed} IDs using ${sourceName}.`, 'warning');
    document.getElementById('scanner-input').focus(); saveExpectedData();
}

window.addExpectedIDsFromPaste = function() {
    const text = document.getElementById('expected-ids').value;
    if (!text.trim()) { showLog('Please paste some IDs first.', 'warning'); return; }
    processRawText(text, 'Pasted Data'); document.getElementById('expected-ids').value = '';
};
window.handleFileUpload = function(event) {
    const f = event.target.files[0]; if (!f) return;
    const r = new FileReader(); r.onload = e => { processRawText(e.target.result, f.name); event.target.value = ''; };
    r.readAsText(f);
};
window.handleReverseFileUpload = function(event) {
    const f = event.target.files[0]; if (!f) return;
    const r = new FileReader(); r.onload = e => { processReverseRawText(e.target.result, f.name); event.target.value = ''; };
    r.readAsText(f);
};
window.resetCurrentFlow = function() {
    if (!confirm(`⚠️ Clear ALL scanned & expected data for "${activeFlowName}"? Backups are safe.`)) return;
    expectedMap.clear(); scannedList.clear(); scanHistory = [];
    remove(ref(db, `scannerV2/flows/${activeFlowKey}/scans`)); remove(ref(db, `scannerV2/flows/${activeFlowKey}/expected`));
    document.getElementById('total-expected').innerText = '0'; document.getElementById('expected-ids').value = '';
    updateSummaryUI(); showLog(`Data for "${activeFlowName}" cleared from cloud.`, 'warning');
};

function updateSummaryUI() {
    document.getElementById('scanned-count').innerText = scannedList.size;
    document.getElementById('download-btn').disabled = (scanHistory.length === 0);
    const tbody = document.getElementById('history-body'); tbody.innerHTML = '';
    for (let i = scanHistory.length - 1; i >= 0; i--) {
        const rec = scanHistory[i]; const isNew = i === scanHistory.length - 1;
        const row = document.createElement('tr'); if (isNew) row.className = 'new-row';
        row.innerHTML = `<td>${rec.number}</td><td>${rec.orderId || '—'}</td><td><strong>${rec.id}</strong></td><td>${rec.time}</td><td><span style="background:#e9ecef;border-radius:4px;padding:2px 6px;font-size:12px;">${rec.device || '?'}</span></td>`;
        tbody.appendChild(row);
    }
}

window.updateBulkCopyButtons = function() {
    const cbs = document.querySelectorAll('.missing-checkbox');
    const n = Array.from(cbs).filter(c => c.checked).length;
    document.getElementById('copy-print-btn').innerText = n ? `📋 Copy ${n} Print Links` : '📋 Copy All Print Links';
    document.getElementById('copy-order-btn').innerText = n ? `📋 Copy ${n} Order Links` : '📋 Copy All Order Links';
};

window.copyBulkLinks = function(type) {
    const cbs = Array.from(document.querySelectorAll('.missing-checkbox'));
    const anyChecked = cbs.some(c => c.checked);
    const targetElements = anyChecked ? cbs.filter(c => c.checked) : cbs;
    
    const attr = type === 'print' ? 'data-print-link' : 'data-order-link';
    const links = targetElements.map(el => el.getAttribute(attr)).filter(l => l && l.trim() !== '');
    
    if (!links.length) { alert('No links to copy.'); return; }
    
    navigator.clipboard.writeText(links.join('\n')).then(() => {
        const btn = document.getElementById(type === 'print' ? 'copy-print-btn' : 'copy-order-btn');
        const orig = btn.innerText; 
        btn.innerText = '✅ Copied!'; 
        setTimeout(() => { btn.innerText = orig; }, 2000);
    }).catch(() => { alert('Copy failed – ensure HTTPS.'); });
};

window.checkRemaining = function() {
    if (!expectedMap.size) { alert("You haven't loaded an expected list yet!"); return; }
    currentMissingIds = []; const container = document.getElementById('missing-list-container'); container.innerHTML = '';
    
    expectedMap.forEach((orderId, tid) => {
        if (scannedList.has(tid)) return;
        currentMissingIds.push(tid);
        
        const printLink = orderId ? `https://sellercentral.amazon.in/easyship/print-documents?orderID=${orderId}` : '';
        const orderDetailLink = orderId ? `https://sellercentral.amazon.in/orders-v3/order/${orderId}` : '';
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="text-align:center;border-bottom:1px solid #ddd;">
                ${orderId ? `<input type="checkbox" class="missing-checkbox" data-print-link="${printLink}" data-order-link="${orderDetailLink}" onchange="updateBulkCopyButtons()">` : ''}
            </td>
            <td style="border-bottom:1px solid #ddd;">
                ${printLink ? `<a href="${printLink}" target="_blank" style="color:#0056b3;text-decoration:none;font-weight:bold;">${tid}</a>` : `<strong>${tid}</strong>`}
            </td>
            <td style="border-bottom:1px solid #ddd;">
                ${orderId ? `<a href="${orderDetailLink}" target="_blank" style="color:#0056b3;text-decoration:none;font-weight:bold;">${orderId}</a>` : '<span style="color:#999;font-size:12px;">Unknown</span>'}
            </td>`;
        container.appendChild(tr);
    });
    
    if (!currentMissingIds.length) {
        playSound('success'); flashScreenGreen(); alert(`🎉 CONGRATULATIONS!\nAll parcels for "${activeFlowName}" have been scanned!`);
    } else {
        document.getElementById('missing-flow-name').innerText = activeFlowName;
        updateBulkCopyButtons(); document.getElementById('missing-modal').style.display = 'block';
    }
};

window.downloadExcel = function() {
    let csv = 'Number,Order ID,Tracking ID,Time Scanned,Device\n';
    scanHistory.forEach(r => { csv += `"${r.number}","${r.orderId}","${r.id}","${r.time}","${r.device || ''}"\n`; });
    triggerDownload(csv, `Scanned_Log_${sanitizeKey(activeFlowName)}.csv`);
};
window.downloadMissingExcel = function() {
    let csv = 'Missing Tracking ID,Order ID,Print Link\n';
    currentMissingIds.forEach(tid => {
        const oid = expectedMap.get(tid) || ''; const link = oid ? `https://sellercentral.amazon.in/easyship/print-documents?orderID=${oid}` : '';
        csv += `"${tid}","${oid}","${link}"\n`;
    });
    triggerDownload(csv, `MISSING_Parcels_${sanitizeKey(activeFlowName)}.csv`);
};
function triggerDownload(content, filename) {
    const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename; a.style.display = 'none';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

window.createBackup = function() {
    if (!scannedList.size) alert('Warning: nothing scanned yet.');
    if (scanHistory.length) downloadExcel();
    let backups = JSON.parse(localStorage.getItem('scannerBackups') || '[]');
    backups.push({ id: Date.now(), time: new Date().toLocaleString(), flow: activeFlowName, scannedCount: scannedList.size, history: scanHistory });
    if (backups.length > 20) backups.shift(); localStorage.setItem('scannerBackups', JSON.stringify(backups));
    showLog('Backup saved!', 'success');
};

window.showBackups = function() {
    const backups = JSON.parse(localStorage.getItem('scannerBackups') || '[]');
    const list = document.getElementById('backup-list'); list.innerHTML = '';
    if (!backups.length) list.innerHTML = '<p style="text-align:center;color:#666;">No backups saved yet.</p>';
    else {
        [...backups].reverse().forEach(b => {
            const div = document.createElement('div'); div.style.cssText = 'border-bottom:1px solid #ddd;padding:12px 0;';
            div.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;"><div><strong>${b.time}</strong><br><span style="font-size:14px;color:#555;">Company: ${b.flow}</span><br><span style="color:#28a745;font-weight:bold;font-size:14px;">✓ ${b.scannedCount} items</span></div><button onclick="restoreBackup(${b.id})" style="background:#17a2b8;color:white;border:none;padding:8px 12px;border-radius:4px;cursor:pointer;font-weight:bold;">Restore to Cloud</button></div>`;
            list.appendChild(div);
        });
    }
    document.getElementById('backup-modal').style.display = 'block';
};

window.restoreBackup = async function(backupId) {
    if (!confirm('⚠️ This will REPLACE all cloud scans for the active company. Proceed?')) return;
    const backups = JSON.parse(localStorage.getItem('scannerBackups') || '[]');
    const target = backups.find(b => b.id === backupId); if (!target) return;
    setCloudStatus('Restoring…', 'syncing'); await remove(ref(db, `scannerV2/flows/${activeFlowKey}/scans`));
    for (const rec of (target.history || [])) {
        await push(ref(db, `scannerV2/flows/${activeFlowKey}/scans`), { id: rec.id, time: rec.time, orderId: expectedMap.get(rec.id) || rec.orderId || '', device: rec.device || 'Restored' });
    }
    document.getElementById('backup-modal').style.display = 'none'; showLog('Backup restored!', 'success');
};

window.onload = function() { setCloudStatus('Connecting…', 'syncing'); listenToFlowList(); };
</script>
